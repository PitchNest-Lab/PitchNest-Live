<?xml version="1.0" encoding="UTF-8"?>
<!--
  Maskable app icon. Per the Android adaptive-icon / PWA maskable spec the artwork
  is FULL-BLEED (the gradient fills the entire square edge-to-edge) with NO baked
  rounded corners and NO drop shadow — the OS applies its own mask (circle, squircle,
  rounded square). The "M" mark is scaled into the inner ~72% "safe zone" so it is
  never clipped by any mask shape. Because the gradient covers every pixel, the
  launcher/splash can never reveal transparent or dark corners.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="pn-grad" x1="152.83" y1="919.55" x2="928.76" y2="158.89" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="1080" fill="url(#pn-grad)"/>
